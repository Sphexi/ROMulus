[project]
name = "romulus"
version = "0.1.0"
description = "Local-first desktop ROM collection manager for retro game consoles"
requires-python = ">=3.12"
dependencies = [
    "PySide6",
    "httpx",
    "pydantic",
    "structlog",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[project.scripts]
romulus = "romulus.__main__:main"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

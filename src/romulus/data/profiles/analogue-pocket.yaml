    supported: false
  # -- Mattel --
  intellivision:
    folder: "intv/common"
    extensions: [".int", ".bin", ".rom", ".itv"]
  # -- NEC --
  supergrafx:
    # SuperGrafx ROMs play via the agg23 PCE core.
    folder: "pce/common"
    extensions: [".sgx", ".pce"]
  # -- Nintendo --
  ereader:
    folder: ""
    supported: false
  n64dd:
    folder: ""
    supported: false
  pokemini:
    folder: "pokemini/common"
    extensions: [".min"]
  satellaview:
    folder: ""
    supported: false
  sufami:
    folder: ""
    supported: false
  # -- RCA --
  studio2:
    folder: ""
    supported: false
  # -- Sega --
  beena:
    folder: ""
    supported: false
  segapico:
    folder: ""
    supported: false
  sg1000:
    # SG-1000 ROMs play via the Master System core on Pocket.
    folder: "sms/common"
    extensions: [".sg", ".bin", ".rom"]
  # -- Tiger --
  gamecom:
    folder: ""
    supported: false
  # -- VTech --
  creativision:
    folder: ""

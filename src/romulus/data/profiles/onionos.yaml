# Onion OS destination profile (Miyoo Mini / Mini+).
#
# Onion OS uses uppercase short-code folders under /Roms/ on the SD card.
# Folder names follow the Onion convention documented at
# https://onionui.github.io/docs/emulators . Onion has no EmulationStation
# gamelist.xml — it runs its own scraper — so gamelist_format is null.
# Onion targets handhelds, so GameCube / PSP / Saturn / Dreamcast are
# unsupported; Atari ST and the home-computer category are also out of scope.
id: onionos
name: "Onion OS"
description: "Custom firmware for the Miyoo Mini / Mini+"
case_sensitive: false
base_path: "Roms"
gamelist_format: null
artwork_subdir: "Imgs"
multi_disc: "m3u"

systems:
  # --- Nintendo ---
  nes:
    folder: "FC"
    extensions: [".nes", ".unf", ".unif", ".fds", ".zip", ".7z"]
  snes:
    folder: "SFC"
    extensions: [".sfc", ".smc", ".fig", ".swc", ".zip", ".7z"]
  n64:
    # N64 was added experimentally to Onion; performance is shaky but it ships.
    folder: "N64"
    extensions: [".z64", ".n64", ".v64", ".rom", ".zip"]
  gamecube:
    folder: ""
    supported: false
  gb:
    folder: "GB"
    extensions: [".gb", ".zip", ".7z"]
  gbc:
    folder: "GBC"
    extensions: [".gbc", ".gb", ".zip", ".7z"]
  gba:
    folder: "GBA"
    extensions: [".gba", ".zip", ".7z"]
  nds:
    folder: ""
    supported: false
  virtualboy:
    folder: "VB"
    extensions: [".vb", ".vboy", ".zip"]
  # --- Sega ---
  megadrive:
    folder: "MD"
    extensions: [".md", ".gen", ".bin", ".smd", ".68k", ".zip", ".7z"]
  mastersystem:
    folder: "MS"
    extensions: [".sms", ".bin", ".zip", ".7z"]
  gamegear:
    folder: "GG"
    extensions: [".gg", ".zip", ".7z"]
  saturn:
    folder: ""
    supported: false
  dreamcast:
    folder: ""
    supported: false
  sega32x:
    folder: "THIRTYTWOX"
    extensions: [".32x", ".bin", ".zip"]
  # --- Sony ---
  psx:
    folder: "PS"
    extensions: [".cue", ".bin", ".iso", ".chd", ".pbp", ".m3u", ".ecm", ".ccd"]
  psp:
    folder: ""
    supported: false
  # --- Atari ---
  atari2600:
    folder: "ATARI"
    extensions: [".a26", ".bin", ".zip"]
  atari7800:
    folder: "SEVENTYEIGHTHUNDRED"
    extensions: [".a78", ".bin", ".zip"]
  lynx:
    folder: "LYNX"
    extensions: [".lnx", ".lyx", ".o", ".zip"]
  atarist:
    folder: ""
    supported: false
  # --- NEC ---
  pcengine:
    folder: "PCE"
    extensions: [".pce", ".bin", ".zip"]
  pcenginecd:
    folder: "PCECD"
    extensions: [".cue", ".bin", ".iso", ".chd", ".ccd"]
  # --- SNK ---
  neogeo:
    folder: "NEOGEO"
    extensions: [".zip", ".7z"]
  ngp:
    folder: "NGP"
    extensions: [".ngp", ".zip"]
  ngpc:
    folder: "NGP"
    extensions: [".ngc", ".npc", ".zip"]
  # --- Arcade ---
  mame:
    folder: "ARCADE"
    extensions: [".zip", ".7z", ".chd"]
  fbneo:
    folder: "FBN"
    extensions: [".zip", ".7z"]
  # --- Home computers ---
  msx:
    folder: "MSX"
    extensions: [".rom", ".dsk", ".cas", ".mx1", ".mx2", ".m3u", ".zip"]
  amiga:
    folder: ""
    supported: false
  c64:
    folder: ""
    supported: false
  zxspectrum:
    folder: "ZXS"
    extensions: [".tap", ".tzx", ".sna", ".z80", ".dsk", ".trd", ".scl", ".szx", ".zip"]
  amstradcpc:
    folder: ""
    supported: false
  # --- Extended registry (v0.1.0 DAT-driven expansion) ---
  # Onion OS targets the Miyoo Mini's ~1GHz Cortex-A7 SoC. The 8/16-bit
  # cartridge era runs cleanly; 32-bit handhelds and anything 3D is out of
  # scope. Folder names follow https://onionui.github.io/docs/emulators .
  # -- Atari --
  atari5200:
    folder: "FIFTYTWOHUNDRED"
    extensions: [".a52", ".bin", ".rom", ".zip"]
  jaguar:
    # Jaguar emulation isn't realistic at Miyoo Mini speeds; skip.
    folder: ""
    supported: false
  # -- Bandai --
  wonderswan:
    folder: "WS"
    extensions: [".ws", ".zip"]
  wonderswancolor:
    folder: "WS"
    extensions: [".wsc", ".ws", ".zip"]
  # -- Benesse --
  pocketchallengev2:
    folder: "WS"
    extensions: [".pc2", ".ws", ".bin", ".zip"]
  # -- Casio --
  casioloopy:
    # MAME-driven, light; folder set so user-supplied dumps stay grouped.
    folder: "CASLOOPY"
    extensions: [".bin", ".zip"]
  pv1000:
    folder: "PV1000"
    extensions: [".bin", ".zip"]
  # -- Coleco --
  colecovision:
    folder: "COLECO"
    extensions: [".col", ".bin", ".rom", ".zip"]
  # -- Commodore --
  c64plus4:
    # Onion's commodore core only really covers C64; Plus/4 unsupported.
    folder: ""
    supported: false
  vic20:
    folder: ""
    supported: false
  # -- Emerson --
  arcadia2001:
    folder: "ARCADIA"
    extensions: [".bin", ".zip"]
  # -- Entex --
  adventurevision:
    folder: "ADVISION"
    extensions: [".bin", ".zip"]
  # -- Epoch --
  scv:
    folder: "SCV"
    extensions: [".bin", ".zip"]
  # -- Fairchild --
  channelf:
    folder: "CHANNELF"
    extensions: [".bin", ".chf", ".rom", ".zip"]
  # -- Funtech --
  superacan:
    folder: "SUPRACAN"
    extensions: [".bin", ".zip"]
  # -- GCE --
  vectrex:
    folder: "VECTREX"
    extensions: [".vec", ".bin", ".gam", ".zip"]
  # -- GamePark --
  gp32:
    folder: ""
    supported: false
  # -- Hartung --
  gamemaster:
    folder: "GMASTER"
    extensions: [".bin", ".zip"]
  # -- Konami --
  picno:
    folder: ""
    supported: false
  # -- LeapFrog --
  leappad:
    folder: ""
    supported: false
  leapster:
    folder: ""
    supported: false
  myfirstleappad:
    folder: ""
    supported: false
  # -- Magnavox --
  odyssey2:
    folder: "ODYSSEY"
    extensions: [".bin", ".zip"]
  # -- Mattel --
  intellivision:
    folder: "INTELLIVISION"
    extensions: [".int", ".bin", ".rom", ".itv", ".zip"]
  # -- NEC --
  supergrafx:
    folder: "SGFX"
    extensions: [".sgx", ".pce", ".zip"]
  # -- Nintendo --
  ereader:
    # Plays via GBA core; sidebar grouping still distinct.
    folder: "EREADER"
    extensions: [".bin", ".raw", ".zip"]
  n64dd:
    folder: ""
    supported: false
  pokemini:
    folder: "POKE"
    extensions: [".min", ".zip"]
  satellaview:
    folder: "SATELLAVIEW"
    extensions: [".bs", ".sfc", ".zip"]
  sufami:
    folder: "SUFAMI"
    extensions: [".st", ".sfc", ".zip"]
  # -- RCA --
  studio2:
    folder: "STUDIO2"
    extensions: [".bin", ".zip"]
  # -- Sega --
  beena:
    folder: ""
    supported: false
  segapico:
    folder: "PICO"
    extensions: [".bin", ".md", ".zip"]
  sg1000:
    folder: "SGFX"
    extensions: [".sg", ".bin", ".rom", ".zip"]
  # -- Tiger --
  gamecom:
    folder: "GAMECOM"
    extensions: [".tgc", ".bin", ".zip"]
  # -- VTech --
  creativision:
    folder: "CRVISION"
    extensions: [".bin", ".zip"]
  vsmile:
    folder: "VSMILE"
    extensions: [".bin", ".zip"]
  # -- Watara --
  supervision:
    folder: "SUPERVISION"
    extensions: [".sv", ".bin", ".zip"]
  # --- Digital-distribution / install-package era ---
  # Miyoo Mini's Cortex-A7 cannot emulate any of these; all unsupported.
  wii:
    folder: ""
    supported: false
  wiiu:
    folder: ""
    supported: false
  n3ds:
    folder: ""
    supported: false
  dsiware:
    folder: ""
    supported: false
  psvita:
    folder: ""
    supported: false
  ps3:
    folder: ""
    supported: false
  xbox360:
    folder: ""
    supported: false
  # --- Mobile / PDA ---
  j2me:
    folder: "J2ME"
    extensions: [".jar", ".jad"]
  palmos:
    folder: ""
    supported: false

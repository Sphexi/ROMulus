# muOS destination profile (Anbernic / generic Allwinner handhelds).
#
# muOS uses /mnt/mmc/ROMS/ with mixed-case folder names. Folder names follow
# the conventions baked into the muOS installer ("Nintendo Entertainment
# System", "Super Nintendo", etc.). muOS uses its own scraper for box-art,
# so gamelist_format is null.
id: muos
name: "muOS"
description: "Custom firmware for Anbernic Linux handhelds and others"
case_sensitive: false
base_path: "ROMS"
gamelist_format: null
artwork_subdir: "box"
multi_disc: "m3u"

systems:
  # --- Nintendo ---
  nes:
    folder: "Nintendo Entertainment System"
    extensions: [".nes", ".unf", ".unif", ".fds", ".zip", ".7z"]
  snes:
    folder: "Super Nintendo Entertainment System"
    extensions: [".sfc", ".smc", ".fig", ".swc", ".zip", ".7z"]
  n64:
    folder: "Nintendo N64"
    extensions: [".z64", ".n64", ".v64", ".rom", ".zip"]
  gamecube:
    # GameCube only runs on the higher-end H700-class handhelds; emulator
    # support varies. Best-effort folder name — audit before release.
    folder: "Nintendo GameCube"
    extensions: [".iso", ".gcm", ".gcz", ".rvz", ".ciso", ".wia"]
  gb:
    folder: "Nintendo Game Boy"
    extensions: [".gb", ".zip", ".7z"]
  gbc:
    folder: "Nintendo Game Boy Color"
    extensions: [".gbc", ".gb", ".zip", ".7z"]
  gba:
    folder: "Nintendo Game Boy Advance"
    extensions: [".gba", ".zip", ".7z"]
  nds:
    folder: "Nintendo DS"
    extensions: [".nds", ".zip", ".7z"]
  virtualboy:
    folder: "Nintendo Virtual Boy"
    extensions: [".vb", ".vboy", ".zip"]
  # --- Sega ---
  megadrive:
    folder: "Sega Mega Drive"
    extensions: [".md", ".gen", ".bin", ".smd", ".68k", ".zip", ".7z"]
  mastersystem:
    folder: "Sega Master System"
    extensions: [".sms", ".bin", ".zip", ".7z"]
  gamegear:
    folder: "Sega Game Gear"
    extensions: [".gg", ".zip", ".7z"]
  saturn:
    folder: "Sega Saturn"
    extensions: [".cue", ".iso", ".chd", ".mds", ".m3u", ".ccd"]
  dreamcast:
    folder: "Sega Dreamcast"
    extensions: [".gdi", ".cdi", ".chd", ".cue", ".m3u"]
  sega32x:
    folder: "Sega 32X"
    extensions: [".32x", ".bin", ".zip"]
  # --- Sony ---
  psx:
    folder: "Sony PlayStation"
    extensions: [".cue", ".bin", ".iso", ".chd", ".pbp", ".m3u", ".ecm", ".ccd"]
  psp:
    folder: "Sony PlayStation Portable"
    extensions: [".iso", ".cso", ".pbp", ".zso", ".dax"]
  # --- Atari ---
  atari2600:
    folder: "Atari 2600"
    extensions: [".a26", ".bin", ".zip"]
  atari7800:
    folder: "Atari 7800"
    extensions: [".a78", ".bin", ".zip"]
  lynx:
    folder: "Atari Lynx"
    extensions: [".lnx", ".lyx", ".o", ".zip"]
  atarist:
    folder: "Atari ST"
    extensions: [".st", ".msa", ".stx", ".dim", ".zip"]
  # --- NEC ---
  pcengine:
    folder: "NEC PC Engine"
    extensions: [".pce", ".bin", ".zip"]
  pcenginecd:
    folder: "NEC PC Engine CD"
    extensions: [".cue", ".bin", ".iso", ".chd", ".ccd"]
  # --- SNK ---
  neogeo:
    folder: "SNK Neo Geo"
    extensions: [".zip", ".7z"]
  ngp:
    folder: "SNK Neo Geo Pocket"
    extensions: [".ngp", ".zip"]
  ngpc:
    folder: "SNK Neo Geo Pocket Color"
    extensions: [".ngc", ".npc", ".zip"]
  # --- Arcade ---
  mame:
    folder: "Arcade"
    extensions: [".zip", ".7z", ".chd"]
  fbneo:
    folder: "Final Burn Neo"
    extensions: [".zip", ".7z"]
  # --- Home computers ---
  msx:
    folder: "Microsoft MSX"
    extensions: [".rom", ".dsk", ".cas", ".mx1", ".mx2", ".m3u", ".zip"]
  amiga:
    folder: "Commodore Amiga"
    extensions: [".adf", ".adz", ".ipf", ".dms", ".hdf", ".lha", ".zip"]
  c64:
    folder: "Commodore 64"
    extensions: [".d64", ".d71", ".d81", ".t64", ".tap", ".prg", ".crt", ".zip"]
  zxspectrum:
    folder: "Sinclair ZX Spectrum"
    extensions: [".tap", ".tzx", ".sna", ".z80", ".dsk", ".trd", ".scl", ".szx", ".zip"]
  amstradcpc:
    folder: "Amstrad CPC"
    extensions: [".dsk", ".cdt", ".cpr", ".zip"]
  # --- Extended registry (v0.1.0 DAT-driven expansion) ---
  # muOS targets more capable Anbernic Cortex-A55 hardware (RG35XX, RG353,
  # RG406, etc.) so it ships libretro cores for the full cartridge era plus
  # PSP / NDS / DC at the upper bound. Folder names follow muOS conventions.
  # -- Atari --
  atari5200:
    folder: "Atari 5200"
    extensions: [".a52", ".bin", ".rom", ".zip"]
  jaguar:
    folder: "Atari Jaguar"
    extensions: [".j64", ".jag", ".rom", ".bin", ".zip"]
  # -- Bandai --
  wonderswan:
    folder: "Bandai WonderSwan"
    extensions: [".ws", ".zip"]
  wonderswancolor:
    folder: "Bandai WonderSwan Color"
    extensions: [".wsc", ".ws", ".zip"]
  # -- Benesse --
  pocketchallengev2:
    folder: "Bandai WonderSwan"
    extensions: [".pc2", ".ws", ".bin", ".zip"]
  # -- Casio --
  casioloopy:
    folder: "Casio Loopy"
    extensions: [".bin", ".zip"]
  pv1000:
    folder: "Casio PV-1000"
    extensions: [".bin", ".zip"]
  # -- Coleco --
  colecovision:
    folder: "Coleco ColecoVision"
    extensions: [".col", ".bin", ".rom", ".zip"]
  # -- Commodore --
  c64plus4:
    folder: "Commodore Plus-4"
    extensions: [".prg", ".d64", ".t64", ".tap", ".crt", ".zip"]
  vic20:
    folder: "Commodore VIC-20"
    extensions: [".prg", ".crt", ".t64", ".tap", ".d64", ".zip"]
  # -- Emerson --
  arcadia2001:
    folder: "Emerson Arcadia 2001"
    extensions: [".bin", ".zip"]
  # -- Entex --
  adventurevision:
    folder: "Entex Adventure Vision"
    extensions: [".bin", ".zip"]
  # -- Epoch --
  scv:
    folder: "Epoch Super Cassette Vision"
    extensions: [".bin", ".zip"]
  # -- Fairchild --
  channelf:
    folder: "Fairchild Channel F"
    extensions: [".bin", ".chf", ".rom", ".zip"]
  # -- Funtech --
  superacan:
    folder: "Funtech Super A'Can"
    extensions: [".bin", ".zip"]
  # -- GCE --
  vectrex:
    folder: "GCE Vectrex"
    extensions: [".vec", ".bin", ".gam", ".zip"]
  # -- GamePark --
  gp32:
    folder: "GamePark GP32"
    extensions: [".gpk", ".smc", ".zip"]
  # -- Hartung --
  gamemaster:
    folder: "Hartung Game Master"
    extensions: [".bin", ".zip"]
  # -- Konami --
  picno:
    folder: "Konami Picno"
    extensions: [".bin", ".zip"]
  # -- LeapFrog --
  leappad:
    folder: "LeapFrog LeapPad"
    extensions: [".bin", ".zip"]
  leapster:
    folder: "LeapFrog Leapster"
    extensions: [".bin", ".zip"]
  myfirstleappad:
    folder: "LeapFrog My First LeapPad"
    extensions: [".bin", ".zip"]
  # -- Magnavox --
  odyssey2:
    folder: "Magnavox Odyssey 2"
    extensions: [".bin", ".zip"]
  # -- Mattel --
  intellivision:
    folder: "Mattel Intellivision"
    extensions: [".int", ".bin", ".rom", ".itv", ".zip"]
  # -- NEC --
  supergrafx:
    folder: "NEC PC Engine SuperGrafx"
    extensions: [".sgx", ".pce", ".zip"]
  # -- Nintendo --
  ereader:
    folder: "Nintendo e-Reader"
    extensions: [".bin", ".raw", ".zip"]
  n64dd:
    folder: "Nintendo 64DD"
    extensions: [".ndd", ".zip"]
  pokemini:
    folder: "Nintendo Pokemon Mini"
    extensions: [".min", ".zip"]
  satellaview:
    folder: "Nintendo Satellaview"
    extensions: [".bs", ".sfc", ".zip"]
  sufami:
    folder: "Nintendo Sufami Turbo"
    extensions: [".st", ".sfc", ".zip"]
  # -- RCA --
  studio2:
    folder: "RCA Studio II"
    extensions: [".bin", ".zip"]
  # -- Sega --
  beena:
    folder: "Sega Beena"
    extensions: [".bin", ".zip"]
  segapico:
    folder: "Sega Pico"
    extensions: [".bin", ".md", ".zip"]
  sg1000:
    folder: "Sega SG-1000"
    extensions: [".sg", ".bin", ".rom", ".zip"]
  # -- Tiger --
  gamecom:
    folder: "Tiger Game.com"
    extensions: [".tgc", ".bin", ".zip"]
  # -- VTech --
  creativision:
    folder: "VTech CreatiVision"
    extensions: [".bin", ".zip"]
  vsmile:
    folder: "VTech V.Smile"
    extensions: [".bin", ".zip"]
  # -- Watara --
  supervision:
    folder: "Watara Supervision"
    extensions: [".sv", ".bin", ".zip"]
  # --- Digital-distribution / install-package era ---
  # Anbernic Cortex-A55 handhelds can run melonDS (DSiWare) but not
  # Wii/Wii U/3DS/PS Vita/PS3/Xbox 360.
  wii:
    folder: ""
    supported: false
  wiiu:
    folder: ""
    supported: false
  n3ds:
    folder: ""
    supported: false
  dsiware:
    folder: "Nintendo DSi"
    extensions: [".nds", ".tad", ".bin"]
  psvita:
    folder: ""
    supported: false
  ps3:
    folder: ""
    supported: false
  xbox360:
    folder: ""
    supported: false
  # --- Mobile / PDA ---
  j2me:
    folder: "Java J2ME"
    extensions: [".jar", ".jad"]
  palmos:
    folder: "Palm OS"
    extensions: [".prc", ".pdb", ".pqa"]

  # Nintendo add-ons / not in catalog.
  n64dd:
    folder: ""
    supported: false
  # Higher-end / digital-install platforms — not playable on Anbernic
  # Android (Cemu/RPCS3/Vita3K/Xenia aren't packaged for these devices).
  wiiu:
    folder: ""
    supported: false
  dsiware:
    folder: ""
    supported: false
  psvita:
    folder: ""
    supported: false
  ps3:
    folder: ""

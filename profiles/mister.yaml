# MiSTer FPGA destination profile.
#
# MiSTer uses /media/fat/games/{Core}/ with capitalised, core-named folders.
# As an FPGA the support set is narrower than software emulators: only
# systems with a hardware core are supported. CD-based and 3D / handheld-3D
# systems (Dreamcast, GameCube, DS, PSP) are out of scope. MiSTer's launcher
# is its own (Main_MiSTer); no gamelist.xml is generated.
id: mister
name: "MiSTer FPGA"
description: "DE10-Nano FPGA cores"
case_sensitive: true
base_path: "games"
gamelist_format: null
artwork_subdir: null
multi_disc: null

systems:
  # --- Nintendo ---
  nes:
    folder: "NES"
    extensions: [".nes", ".unf", ".unif", ".fds", ".zip"]
  snes:
    folder: "SNES"
    extensions: [".sfc", ".smc", ".fig", ".swc", ".zip"]
  n64:
    folder: "N64"
    extensions: [".z64", ".n64", ".v64", ".rom"]
  gamecube:
    folder: ""
    supported: false
  gb:
    folder: "GameBoy"
    extensions: [".gb", ".zip"]
  gbc:
    folder: "GameBoy"
    extensions: [".gbc", ".gb", ".zip"]
  gba:
    folder: "GBA"
    extensions: [".gba", ".zip"]
  nds:
    folder: ""
    supported: false
  virtualboy:
    # Distinct VB core exists; folder name matches the official release.
    folder: "VirtualBoy"
    extensions: [".vb", ".vboy", ".zip"]
  # --- Sega ---
  megadrive:
    folder: "Genesis"
    extensions: [".md", ".gen", ".bin", ".smd", ".68k", ".zip"]
  mastersystem:
    folder: "SMS"
    extensions: [".sms", ".bin", ".zip"]
  gamegear:
    folder: "SMS"
    extensions: [".gg", ".zip"]
  saturn:
    folder: ""
    supported: false
  dreamcast:
    folder: ""
    supported: false
  sega32x:
    folder: "S32X"
    extensions: [".32x", ".bin", ".zip"]
  # --- Sony ---
  psx:
    folder: "PSX"
    extensions: [".cue", ".bin", ".iso", ".chd", ".pbp", ".m3u", ".ecm", ".ccd"]
  psp:
    folder: ""
    supported: false
  # --- Atari ---
  atari2600:
    folder: "ATARI7800"
    extensions: [".a26", ".bin", ".zip"]
  atari7800:
    folder: "ATARI7800"
    extensions: [".a78", ".bin", ".zip"]
  lynx:
    folder: "AtariLynx"
    extensions: [".lnx", ".lyx", ".o", ".zip"]
  atarist:
    # AO486 core can run TOS but there's no native ST core; mark unsupported.
    folder: ""
    supported: false
  # --- NEC ---
  pcengine:
    folder: "TGFX16"
    extensions: [".pce", ".bin", ".zip"]
  pcenginecd:
    folder: "TGFX16-CD"
    extensions: [".cue", ".bin", ".iso", ".chd", ".ccd"]
  # --- SNK ---
  neogeo:
    folder: "NEOGEO"
    extensions: [".zip", ".7z"]
  ngp:
    folder: "NeoGeo-Pocket"
    extensions: [".ngp", ".zip"]
  ngpc:
    folder: "NeoGeo-Pocket"
    extensions: [".ngc", ".npc", ".zip"]
  # --- Arcade ---
  mame:
    # MiSTer's arcade support is per-core (one folder per game). The generic
    # MAME-style ZIP dump goes under /games/Arcade-rom-folder as a staging
    # area; users wire individual cores up afterwards.
    folder: "Arcade"
    extensions: [".zip", ".7z", ".chd"]
  fbneo:
    folder: ""
    supported: false
  # --- Home computers ---
  msx:
    folder: "MSX"
    extensions: [".rom", ".dsk", ".cas", ".mx1", ".mx2", ".m3u", ".zip"]
  amiga:
    folder: "Amiga"
    extensions: [".adf", ".adz", ".ipf", ".dms", ".hdf", ".lha", ".zip"]
  c64:
    folder: "C64"
    extensions: [".d64", ".d71", ".d81", ".t64", ".tap", ".prg", ".crt", ".zip"]
  zxspectrum:
    folder: "ZX-Spectrum"
    extensions: [".tap", ".tzx", ".sna", ".z80", ".dsk", ".trd", ".scl", ".szx", ".zip"]
  amstradcpc:
    folder: "Amstrad"
    extensions: [".dsk", ".cdt", ".cpr", ".zip"]
  # --- Extended registry (v0.1.0 DAT-driven expansion) ---
  # MiSTer is FPGA-only; a SystemDef gets ``supported: true`` here only if
  # a real hardware core exists in the official MiSTer-devel GitHub set.
  # Folder names are the published core release folder under /games/.
  # Sources: https://github.com/MiSTer-devel and the wiki "Console Cores"
  # / "Computer Cores" pages. Folder names verified against the 2026
  # mister-devel monthly build manifest.
  # -- Atari --
  atari5200:
    # Official 5200 core released 2022 as "Atari5200_MiSTer".
    folder: "ATARI5200"
    extensions: [".a52", ".bin", ".rom", ".zip"]
  jaguar:
    # The Jaguar core exists (Jaguar_MiSTer) but cartridge support is
    # incomplete and CD support is broken; leaving disabled for v0.1.0.
    folder: ""
    supported: false
  # -- Bandai --
  wonderswan:
    folder: "WonderSwan"
    extensions: [".ws", ".zip"]
  wonderswancolor:
    folder: "WonderSwan"
    extensions: [".wsc", ".ws", ".zip"]
  # -- Benesse --
  pocketchallengev2:
    # No dedicated core; PCv2 carts run on the WonderSwan core.
    folder: "WonderSwan"
    extensions: [".pc2", ".ws", ".bin", ".zip"]
  # -- Casio --
  casioloopy:
    folder: ""
    supported: false
  pv1000:
    folder: ""
    supported: false
  # -- Coleco --
  colecovision:
    folder: "Coleco"
    extensions: [".col", ".bin", ".rom", ".zip"]
  # -- Commodore --
  c64plus4:
    # No Plus/4 core; only C64 and VIC-20 cores ship.
    folder: ""
    supported: false
  vic20:
    folder: "VIC20"
    extensions: [".prg", ".crt", ".t64", ".tap", ".d64", ".zip"]
  # -- Emerson --
  arcadia2001:
    # "Arcadia_MiSTer" core; folder published as "Arcadia".
    folder: "Arcadia"
    extensions: [".bin", ".zip"]
  # -- Entex --
  adventurevision:
    # "AVision_MiSTer"; folder published as "AVision".
    folder: "AVision"
    extensions: [".bin", ".zip"]
  # -- Epoch --
  scv:
    folder: ""
    supported: false
  # -- Fairchild --
  channelf:
    folder: "ChannelF"
    extensions: [".bin", ".chf", ".rom", ".zip"]
  # -- Funtech --
  superacan:
    folder: ""
    supported: false
  # -- GCE --
  vectrex:
    folder: "VECTREX"
    extensions: [".vec", ".bin", ".gam", ".zip"]
  # -- GamePark --
  gp32:
    folder: ""
    supported: false
  # -- Hartung --
  gamemaster:
    folder: ""
    supported: false
  # -- Konami --
  picno:
    folder: ""
    supported: false
  # -- LeapFrog --
  leappad:
    folder: ""
    supported: false
  leapster:
    folder: ""
    supported: false
  myfirstleappad:
    folder: ""
    supported: false
  # -- Magnavox --
  odyssey2:
    # "Odyssey2_MiSTer" core; folder "ODYSSEY2".
    folder: "ODYSSEY2"
    extensions: [".bin", ".zip"]
  # -- Mattel --
  intellivision:
    folder: "Intellivision"
    extensions: [".int", ".bin", ".rom", ".itv", ".zip"]
  # -- NEC --
  supergrafx:
    # SuperGrafx is supported by the TGFX16 core directly.
    folder: "TGFX16"
    extensions: [".sgx", ".pce", ".zip"]
  # -- Nintendo --
  ereader:
    # No e-Reader core; cards are normally read into a GBA, and the GBA
    # core doesn't read dotcode dumps from disk. Skip for FPGA.
    folder: ""
    supported: false
  n64dd:
    # The N64 core does not yet support 64DD disk loading.
    folder: ""
    supported: false
  pokemini:
    folder: "PokemonMini"
    extensions: [".min", ".zip"]
  satellaview:
    # Satellaview ROMs play via the SNES core, but the asset routing here
    # is system-distinct so users keep them grouped.
    folder: "SNES"
    extensions: [".bs", ".sfc", ".zip"]
  sufami:
    folder: "SNES"
    extensions: [".st", ".sfc", ".zip"]
  # -- RCA --
  studio2:
    folder: ""
    supported: false
  # -- Sega --
  beena:
    folder: ""
    supported: false
  segapico:
    # Sega Pico runs on the Mega Drive (Genesis) core but requires
    # special-case BIOS; no separate FPGA folder, mark unsupported.
    folder: ""
    supported: false
  sg1000:
    # SG-1000 plays on the SMS core ("Mark III" mode).
    folder: "SMS"
    extensions: [".sg", ".bin", ".rom", ".zip"]
  # -- Tiger --
  gamecom:
    folder: ""
    supported: false
  # -- VTech --
  creativision:
    folder: ""
    supported: false
  vsmile:
    folder: ""
    supported: false
  # -- Watara --
  supervision:
    folder: ""
    supported: false
  # --- Digital-distribution / install-package era ---
  # MiSTer is FPGA; no core for any 3D-era / digital-distribution system.
  wii:
    folder: ""
    supported: false
  wiiu:
    folder: ""
    supported: false
  n3ds:
    folder: ""
    supported: false
  dsiware:
    folder: ""
    supported: false
  psvita:
    folder: ""
    supported: false
  ps3:
    folder: ""
    supported: false
  xbox360:
    folder: ""
    supported: false
  # --- Mobile / PDA ---
  j2me:
    folder: ""
    supported: false
  palmos:
    folder: ""
    supported: false

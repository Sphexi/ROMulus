# RetroPie destination profile.
#
# RetroPie also uses EmulationStation, but the canonical folder names differ
# from Batocera in a few places (e.g. "genesis" for Mega Drive, "pcengine"
# for both HuCard and CD-ROM², "atarilynx" for Lynx). See
# https://retropie.org.uk/docs/ for the full list.
id: retropie
name: "RetroPie"
description: "EmulationStation/EmulationStation-DE on Raspberry Pi and friends"
case_sensitive: true
base_path: "roms"
gamelist_format: "emulationstation_xml"
artwork_subdir: "images"
# EmulationStation classic suffixes each artwork file with ``-image``
# so the launcher can distinguish covers from marquees/screenshots
# stored in the same folder.
artwork_filename_template: "{stem}-image{ext}"
multi_disc: "m3u"

systems:
  # --- Nintendo ---
  nes:
    folder: "nes"
    extensions: [".nes", ".unf", ".unif", ".fds", ".zip", ".7z"]
  snes:
    folder: "snes"
    extensions: [".sfc", ".smc", ".fig", ".swc", ".zip", ".7z"]
  n64:
    folder: "n64"
    extensions: [".z64", ".n64", ".v64", ".rom", ".zip"]
  gamecube:
    folder: "gc"
    extensions: [".iso", ".gcm", ".gcz", ".rvz", ".ciso", ".wia"]
  gb:
    folder: "gb"
    extensions: [".gb", ".zip", ".7z"]
  gbc:
    folder: "gbc"
    extensions: [".gbc", ".gb", ".zip", ".7z"]
  gba:
    folder: "gba"
    extensions: [".gba", ".zip", ".7z"]
  nds:
    folder: "nds"
    extensions: [".nds", ".zip", ".7z"]
  virtualboy:
    folder: "virtualboy"
    extensions: [".vb", ".vboy", ".zip"]
  # --- Sega ---
  megadrive:
    # RetroPie historically used 'megadrive' on EU images and 'genesis' on US.
    # Modern installs default to 'megadrive'; we match that.
    folder: "megadrive"
    extensions: [".md", ".gen", ".bin", ".smd", ".68k", ".zip", ".7z"]
  mastersystem:
    folder: "mastersystem"
    extensions: [".sms", ".bin", ".zip", ".7z"]
  gamegear:
    folder: "gamegear"
    extensions: [".gg", ".zip", ".7z"]
  saturn:
    folder: "saturn"
    extensions: [".cue", ".iso", ".chd", ".mds", ".m3u", ".ccd"]
  dreamcast:
    folder: "dreamcast"
    extensions: [".gdi", ".cdi", ".chd", ".cue", ".m3u"]
  sega32x:
    folder: "sega32x"
    extensions: [".32x", ".bin", ".zip"]
  # --- Sony ---
  psx:
    folder: "psx"
    extensions: [".cue", ".bin", ".iso", ".chd", ".pbp", ".m3u", ".ecm", ".ccd"]
  psp:
    folder: "psp"
    extensions: [".iso", ".cso", ".pbp", ".zso", ".dax"]
  # --- Atari ---
  atari2600:
    folder: "atari2600"
    extensions: [".a26", ".bin", ".zip"]
  atari7800:
    folder: "atari7800"
    extensions: [".a78", ".bin", ".zip"]
  lynx:
    folder: "atarilynx"
    extensions: [".lnx", ".lyx", ".o", ".zip"]
  atarist:
    folder: "atarist"
    extensions: [".st", ".msa", ".stx", ".dim", ".zip"]
  # --- NEC ---
  pcengine:
    folder: "pcengine"
    extensions: [".pce", ".bin", ".zip"]
  pcenginecd:
    folder: "pcenginecd"
    extensions: [".cue", ".bin", ".iso", ".chd", ".ccd"]
  # --- SNK ---
  neogeo:
    folder: "neogeo"
    extensions: [".zip", ".7z"]
  ngp:
    folder: "ngp"
    extensions: [".ngp", ".zip"]
  ngpc:
    folder: "ngpc"
    extensions: [".ngc", ".npc", ".zip"]
  # --- Arcade ---
  mame:
    folder: "mame-libretro"
    extensions: [".zip", ".7z", ".chd"]
  fbneo:
    folder: "fbneo"
    extensions: [".zip", ".7z"]
  # --- Home computers ---
  msx:
    folder: "msx"
    extensions: [".rom", ".dsk", ".cas", ".mx1", ".mx2", ".m3u", ".zip"]
  amiga:
    folder: "amiga"
    extensions: [".adf", ".adz", ".ipf", ".dms", ".hdf", ".lha", ".zip"]
  c64:
    folder: "c64"
    extensions: [".d64", ".d71", ".d81", ".t64", ".tap", ".prg", ".crt", ".zip"]
  zxspectrum:
    folder: "zxspectrum"
    extensions: [".tap", ".tzx", ".sna", ".z80", ".dsk", ".trd", ".scl", ".szx", ".zip"]
  amstradcpc:
    folder: "amstradcpc"
    extensions: [".dsk", ".cdt", ".cpr", ".zip"]
  # --- Extended registry (v0.1.0 DAT-driven expansion) ---
  # RetroPie covers the cartridge era + handhelds via libretro cores. Folder
  # names follow the RetroPie EmulationStation system list at
  # https://retropie.org.uk/docs/Supported-Systems/.
  # -- Atari --
  atari5200:
    folder: "atari5200"
    extensions: [".a52", ".bin", ".rom", ".zip"]
  jaguar:
    folder: "atarijaguar"
    extensions: [".j64", ".jag", ".rom", ".bin", ".zip"]
  # -- Bandai --
  wonderswan:
    folder: "wonderswan"
    extensions: [".ws", ".zip"]
  wonderswancolor:
    folder: "wonderswancolor"
    extensions: [".wsc", ".ws", ".zip"]
  # -- Benesse --
  pocketchallengev2:
    # Plays via the WonderSwan (Mednafen) core; folder kept distinct.
    folder: "wonderswan"
    extensions: [".pc2", ".ws", ".bin", ".zip"]
  # -- Casio --
  casioloopy:
    # No dedicated RetroPie core; folder retained for collection grouping.
    folder: "casloopy"
    extensions: [".bin", ".zip"]
  pv1000:
    folder: "pv1000"
    extensions: [".bin", ".zip"]
  # -- Coleco --
  colecovision:
    folder: "coleco"
    extensions: [".col", ".bin", ".rom", ".zip"]
  # -- Commodore --
  c64plus4:
    folder: "plus4"
    extensions: [".prg", ".d64", ".t64", ".tap", ".crt", ".zip"]
  vic20:
    folder: "vic20"
    extensions: [".prg", ".crt", ".t64", ".tap", ".d64", ".zip"]
  # -- Emerson --
  arcadia2001:
    folder: "arcadia"
    extensions: [".bin", ".zip"]
  # -- Entex --
  adventurevision:
    folder: "advision"
    extensions: [".bin", ".zip"]
  # -- Epoch --
  scv:
    folder: "scv"
    extensions: [".bin", ".zip"]
  # -- Fairchild --
  channelf:
    folder: "channelf"
    extensions: [".bin", ".chf", ".rom", ".zip"]
  # -- Funtech --
  superacan:
    folder: "supracan"
    extensions: [".bin", ".zip"]
  # -- GCE --
  vectrex:
    folder: "vectrex"
    extensions: [".vec", ".bin", ".gam", ".zip"]
  # -- GamePark --
  gp32:
    # No native RetroPie installer; folder retained for grouping.
    folder: "gp32"
    extensions: [".gpk", ".smc", ".zip"]
  # -- Hartung --
  gamemaster:
    folder: "gmaster"
    extensions: [".bin", ".zip"]
  # -- Konami --
  picno:
    folder: "picno"
    extensions: [".bin", ".zip"]
  # -- LeapFrog --
  leappad:
    folder: "leappad"
    extensions: [".bin", ".zip"]
  leapster:
    folder: "leapster"
    extensions: [".bin", ".zip"]
  myfirstleappad:
    folder: "myfirstleappad"
    extensions: [".bin", ".zip"]
  # -- Magnavox --
  odyssey2:
    folder: "odyssey2"
    extensions: [".bin", ".zip"]
  # -- Mattel --
  intellivision:
    folder: "intellivision"
    extensions: [".int", ".bin", ".rom", ".itv", ".zip"]
  # -- NEC --
  supergrafx:
    folder: "supergrafx"
    extensions: [".sgx", ".pce", ".zip"]
  # -- Nintendo --
  ereader:
    folder: "ereader"
    extensions: [".bin", ".raw", ".zip"]
  n64dd:
    folder: "n64dd"
    extensions: [".ndd", ".zip"]
  pokemini:
    folder: "pokemini"
    extensions: [".min", ".zip"]
  satellaview:
    folder: "satellaview"
    extensions: [".bs", ".sfc", ".zip"]
  sufami:
    folder: "sufamiturbo"
    extensions: [".st", ".sfc", ".zip"]
  # -- RCA --
  studio2:
    folder: "studio2"
    extensions: [".bin", ".zip"]
  # -- Sega --
  beena:
    # No core, but folder kept for collection completeness.
    folder: "beena"
    extensions: [".bin", ".zip"]
  segapico:
    folder: "pico"
    extensions: [".bin", ".md", ".zip"]
  sg1000:
    folder: "sg-1000"
    extensions: [".sg", ".bin", ".rom", ".zip"]
  # -- Tiger --
  gamecom:
    folder: "gamecom"
    extensions: [".tgc", ".bin", ".zip"]
  # -- VTech --
  creativision:
    folder: "crvision"
    extensions: [".bin", ".zip"]
  vsmile:
    folder: "vsmile"
    extensions: [".bin", ".zip"]
  # -- Watara --
  supervision:
    folder: "supervision"
    extensions: [".sv", ".bin", ".zip"]
  # --- Digital-distribution / install-package era ---
  # RetroPie runs on Raspberry Pi-class hardware. Pi 4+ can run Dolphin
  # (Wii); Wii U / 3DS / PS Vita / PS3 / Xbox 360 / DSiWare are out of reach.
  wii:
    # Dolphin works on Pi 4 and especially Pi 5 — performance varies wildly
    # per title, but Romulus's job is to organize, not benchmark.
    folder: "wii"
    extensions: [".iso", ".wbfs", ".rvz", ".wia", ".ciso", ".gcz", ".wad", ".nkit.iso"]
  wiiu:
    folder: ""
    supported: false
  n3ds:
    # Citra on Pi 5 is plausible; older Pis cannot.
    folder: "3ds"
    extensions: [".3ds", ".cia", ".cci", ".cxi", ".app"]
  dsiware:
    folder: ""
    supported: false
  psvita:
    folder: ""
    supported: false
  ps3:
    folder: ""
    supported: false
  xbox360:
    folder: ""
    supported: false
  # --- Mobile / PDA ---
  j2me:
    folder: "j2me"
    extensions: [".jar", ".jad"]
  palmos:
    folder: "palm"
    extensions: [".prc", ".pdb", ".pqa"]

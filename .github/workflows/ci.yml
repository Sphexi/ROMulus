name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN — lint+test only need to read
# the repo. Per security audit v0.1.0 finding #10.
permissions:
  contents: read

jobs:
  test:
    name: Lint and test (Python 3.12)
    # ROMulus is a Windows-only desktop app (PyInstaller --onefile portable
    # ZIP). Running CI on the same OS we ship for means lint + tests exercise
    # the same Qt/SQLite/PySide6 stack end users will run, and we sidestep
    # a flaky Linux + PySide6 + sqlite3 segfault in
    # ``test_worker_emits_progress_and_finishes`` that couldn't be pinned
    # to a specific Python-level cause (deepest visible frame was inside
    # the C-level ``conn.close()`` of the worker thread; commits 4f42f9f
    # and 5ef99f4 narrowed the surface but didn't eliminate it).
    runs-on: windows-latest
    env:
      # PySide6 widget tests instantiate QApplication/QWidget. Force the
      # offscreen platform plugin so Qt doesn't try to spin up a real
      # window on the headless runner.
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        # SHA-pinned (v4.2.2) per security audit v0.1.0 finding #10 —
        # major-version tags are mutable and could be re-pointed by a
        # compromised actions org.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.12
        id: setup-python
        # SHA-pinned (v5.3.0) per security audit v0.1.0 finding #10.
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Run pytest
        run: python -m pytest

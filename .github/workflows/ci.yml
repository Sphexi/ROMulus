name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN — lint+test only need to read
# the repo. Per security audit v0.1.0 finding #10.
permissions:
  contents: read

jobs:
  test:
    name: Lint and test (Python 3.12)
    runs-on: ubuntu-latest
    env:
      # PySide6 widget tests instantiate QApplication/QWidget. The Ubuntu
      # runners have no display server, so force the offscreen platform
      # plugin so Qt doesn't try to connect to X11 / Wayland.
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        # SHA-pinned (v4.2.2) per security audit v0.1.0 finding #10 —
        # major-version tags are mutable and could be re-pointed by a
        # compromised actions org.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.12
        id: setup-python
        # SHA-pinned (v5.3.0) per security audit v0.1.0 finding #10.
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies for PySide6
        # PySide6 wheels link against several X11/GL/EGL libraries that are
        # not installed on the GitHub-hosted ubuntu-latest image by default.
        # Even in offscreen mode the libraries must be present at import time
        # or `from PySide6.QtWidgets import ...` fails with ImportError.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libfontconfig1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Run pytest
        run: python -m pytest
